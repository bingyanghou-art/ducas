version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: ducas-hummingbot_gateway_1
      APP_PORT: 15888
      PROXY_AUTH_ADD: 'true'
    container_name: ducas-hummingbot_app_proxy_1

  hummingbot:
    container_name: hummingbot
    image: hummingbot/hummingbot:latest
    volumes:
      - ${APP_DATA_DIR}/conf:/home/hummingbot/conf
      - ${APP_DATA_DIR}/conf/connectors:/home/hummingbot/conf/connectors
      - ${APP_DATA_DIR}/conf/strategies:/home/hummingbot/conf/strategies
      - ${APP_DATA_DIR}/conf/controllers:/home/hummingbot/conf/controllers
      - ${APP_DATA_DIR}/conf/scripts:/home/hummingbot/conf/scripts
      - ${APP_DATA_DIR}/logs:/home/hummingbot/logs
      - ${APP_DATA_DIR}/data:/home/hummingbot/data
      - ${APP_DATA_DIR}/certs:/home/hummingbot/certs
      - ${APP_DATA_DIR}/scripts:/home/hummingbot/scripts
      - ${APP_DATA_DIR}/controllers:/home/hummingbot/controllers
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    tty: true
    stdin_open: true
    network_mode: host

  gateway:
   profiles: ["gateway"]
   restart: always
   container_name: ducas-hummingbot_gateway_1
   image: hummingbot/gateway:latest
   ports:
     - "15888:15888"
   volumes:
     - "./gateway-files/conf:/home/gateway/conf"
     - "./gateway-files/logs:/home/gateway/logs"
     - "./certs:/home/gateway/certs"
   environment:
     - GATEWAY_PASSPHRASE=admin
     - DEV=true


